<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>History - AgroVision AI</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<script defer src="{{ url_for('static', filename='js/main.js') }}"></script>
<script defer src="{{ url_for('static', filename='js/history.js') }}"></script>
</head>
<body>

<nav class="navbar">
<div class="logo" onclick="go('/')">
  <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--primary);"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
  AgroVision <span style="font-weight: 300; opacity: 0.8;">AI</span>
</div>
<ul>
<li onclick="go('/')">Home</li>
<li onclick="go('/dashboard')">Dashboard</li>
<li onclick="go('/history')">History</li>
<li onclick="go('/contact')">Contact</li>
{% if not session.get('user_id') %}
<li onclick="go('/login')">Login</li>
{% else %}
<li onclick="go('/logout')">Logout</li>
{% endif %}
</ul>
</nav>

<div class="container">
  <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem;">
    <div>
      <h2>Diagnosis History</h2>
      <p>View your past crop disease predictions and advisory history.</p>
    </div>
    <button class="btn" style="width: auto; padding: 0.6rem 1.2rem; background: rgba(255,255,255,0.8); color: var(--text-main); border: 1px solid var(--card-border);" onclick="go('/dashboard')">
      New Diagnosis
    </button>
  </div>

  <div class="card" style="padding: 1.5rem; overflow-x: auto;">
    <table>
      <thead>
      <tr>
        <th>Image</th>
        <th>Detected Disease</th>
        <th>Severity Filter</th>
        <th>AI Confidence</th>
      </tr>
      </thead>
      <tbody id="historyTable">
        <!-- JS will populate rows -->
      </tbody>
    </table>
  </div>
</div>

</body>
</html>
