<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - AgroVision AI</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<script defer src="{{ url_for('static', filename='js/main.js') }}"></script>
</head>
<body>

<nav class="navbar">
<div class="logo" onclick="go('/')">
  <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--primary);"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
  AgroVision <span style="font-weight: 300; opacity: 0.8;">AI</span>
</div>
<ul>
<li onclick="go('/')">Home</li>
<li onclick="go('/dashboard')">Dashboard</li>
<li onclick="go('/history')">History</li>
<li onclick="go('/contact')">Contact</li>
{% if not session.get('user_id') %}
<li onclick="go('/login')">Login</li>
{% else %}
<li onclick="go('/logout')">Logout</li>
{% endif %}
</ul>
</nav>

<div class="container">
  <div class="card form-card" style="max-width: 500px;">
    <div style="text-align: center; margin-bottom: 2rem;">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--primary); margin-bottom: 1rem;"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
      <h2>Contact Us</h2>
      <p>We'd love to hear from you</p>
    </div>
    
    <div style="text-align: center;">
      <p style="margin-bottom: 20px; color: var(--text-muted);">For inquiries, please reach out via email:</p>
      <a href="mailto:support@agrovision.ai" class="btn" style="text-decoration: none; display: inline-flex; align-items: center; justify-content: center; gap: 10px;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        Send Email
      </a>
    </div>

    <hr style="margin: 30px 0; border: none; border-top: 1px solid var(--card-border);">

    <form onsubmit="event.preventDefault(); window.location.href='mailto:support@agrovision.ai?subject=Inquiry from ' + document.getElementById('name').value + '&body=' + document.getElementById('msg').value;">
      <input type="text" id="name" placeholder="Your Name" required>
      <input type="email" placeholder="Your Email Address" required>
      <textarea id="msg" rows="5" placeholder="How can we help you?" required></textarea>
      <button class="btn" type="submit">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        Open Mail App
      </button>
    </form>
  </div>
</div>

</body>
</html>
